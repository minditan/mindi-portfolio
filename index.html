<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindi Tan | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css?v=384" />
  </head>
  <body>
    <div id="intro" class="intro" aria-live="polite">
      <img
        class="intro-bunny-sticker intro-bunny-sticker--left"
        src=""
        alt=""
        aria-hidden="true"
        hidden
      />
      <img
        class="intro-bunny-sticker intro-bunny-sticker--right"
        src=""
        alt=""
        aria-hidden="true"
        hidden
      />
      <div class="intro-panel">
        <h1 class="intro-title">Welcome to Mindi's RoomFolio! ୨ৎ⋆.˚</h1>

        <div class="intro-action">
          <p class="intro-status" id="intro-status">
            Loading<span class="intro-dots"><span>.</span><span>.</span><span>.</span></span>
          </p>
          <div class="intro-enter-row" id="intro-enter-row" hidden>
            <button class="intro-enter" id="intro-enter" type="button">
              <span class="intro-enter-label" id="intro-enter-label">Enter!</span>
            </button>
          </div>
        </div>

        <div class="intro-footer" id="intro-footer">
          <p class="intro-nav-hint" id="intro-nav-hint">
            drag to look around · click the pink chair to sit!
          </p>
          <p class="intro-desktop-note">best viewed on desktop :)</p>
        </div>
      </div>
    </div>

    <button id="back" type="button" hidden aria-label="Go back">
      <span aria-hidden="true">←</span>
      Go back
    </button>
    <button id="chair-cursor" type="button" hidden aria-label="Click to sit and learn more about my portfolio and experiences">
      <span class="chair-cursor-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <path
            fill="currentColor"
            d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"
          />
        </svg>
      </span>
      <span class="chair-cursor-subtitle">Click to sit</span>
    </button>
    <button id="monitor-cursor" type="button" hidden aria-label="Zoom into monitor">
      <span class="monitor-cursor-label">Click me to zoom into the monitor!</span>
      <span class="monitor-cursor-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M6 2.5 18 11.5l-4.8.55 2.35 6.45-2.35 1.05-2.35-6.45L6 18V2.5z"
          />
        </svg>
      </span>
    </button>
    <button id="record-cursor" type="button" hidden aria-label="Click for playlist">
      <span class="record-cursor-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <path
            fill="currentColor"
            d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"
          />
        </svg>
      </span>
      <span class="record-cursor-subtitle">Click for playlist</span>
    </button>
    <div id="music-playlist" class="music-playlist" hidden>
      <button type="button" class="music-playlist-backdrop" data-close-playlist aria-label="Close playlist"></button>
      <div class="music-playlist-panel" role="dialog" aria-labelledby="music-playlist-title">
        <button type="button" class="music-playlist-close" data-close-playlist aria-label="Close playlist">
          ×
        </button>
        <h2 id="music-playlist-title" class="music-playlist-title">Mindi's Playlist ♬⋆.˚</h2>
        <p class="music-playlist-subtitle">Record Player</p>
        <ol id="music-track-list" class="music-track-list"></ol>
        <div id="music-playlist-controls" class="music-controls-host"></div>
      </div>
    </div>
    <div id="room-music-bar" class="room-music-bar" hidden>
      <div class="room-music-bar__info">
        <span class="room-music-bar__label">Now playing</span>
        <span id="room-music-now-playing" class="room-music-bar__track">
          <span class="room-music-bar__track-title">Select a song</span>
          <span class="room-music-bar__track-artist"></span>
        </span>
      </div>
      <div id="room-music-controls" class="music-controls-host"></div>
    </div>
    <template id="music-controls-template">
      <div class="music-controls" data-music-controls>
        <button type="button" class="music-btn" data-action="prev" aria-label="Previous track">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M6 6h2v12H6V6zm3.5 6 8.5 6V6l-8.5 6z" />
          </svg>
        </button>
        <button type="button" class="music-btn music-btn--primary" data-action="toggle-play" aria-label="Play">
          <svg class="music-icon-play" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M8 5v14l11-7z" />
          </svg>
          <svg class="music-icon-pause" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <button type="button" class="music-btn" data-action="next" aria-label="Next track">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M16 18h2V6h-2v12zm-11-7 8.5-6v12L5 11z" />
          </svg>
        </button>
        <button type="button" class="music-btn" data-action="toggle-mute" aria-label="Mute audio" title="Mute">
          <svg class="music-icon-volume" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm7.5 3c0-1.66-1.34-3-3-3v6a3 3 0 0 0 3-3z" />
            <path fill="currentColor" d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-1.09-.2-2.14-.57-3.1z" />
          </svg>
          <svg class="music-icon-muted" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3z" />
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M16 9l5 6M21 9l-5 6" />
          </svg>
        </button>
      </div>
    </template>
    <div id="hint" class="is-hidden">Click the chair to learn more about my portfolio and experiences!</div>
    <div id="monitor-screen" hidden>
      <iframe
        id="monitor-screen-frame"
        title="Desktop"
        src="/monitor-desktop.html"
      ></iframe>
    </div>
    <script type="module" src="/src/main.js?v=391"></script>
  </body>
</html>
